<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Civil Eng Revision</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a202c;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
 .login-box {
    background: #2d3748;
    padding: 40px;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  h1 {
    margin: 0 0 30px 0;
    text-align: center;
    color: #90cdf4;
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #1a202c;
    border: 1px solid #4a5568;
    border-radius: 4px;
    color: #e2e8f0;
    font-size: 16px;
    box-sizing: border-box;
  }
  input:focus { outline: none; border-color: #63b3ed; }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    background: #2b6cb0;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover { background: #2c5282; }
  button:disabled { background: #4a5568; cursor: not-allowed; }
  #error-msg {
    color: #fc8181;
    margin-top: 12px;
    font-size: 14px;
    min-height: 20px;
    text-align: center;
  }
 .links {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
  }
 .links a {
    color: #63b3ed;
    text-decoration: none;
    cursor: pointer;
    display: block;
    margin: 8px 0;
  }
</style>
</head>
<body>
<div class="login-box">
  <h1>Login to Civil Eng Revision</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <div id="error-msg"></div>
  <button id="login-btn">Login</button>

  <div class="links">
    <a id="forgot-btn">Forgot password?</a>
    <a href="register.html">Don't have an account? Sign up</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjPfuz8DdGgEnRsD9nXeka2yN7v_oh3jk",
    authDomain: "junior-study.firebaseapp.com",
    projectId: "junior-study",
    storageBucket: "junior-study.firebasestorage.app",
    messagingSenderId: "942218434406",
    appId: "1:942218434406:web:8e95fc80fc28c79fe01aa7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const errorDiv = document.getElementById('error-msg');
  const loginBtn = document.getElementById('login-btn');
  const forgotBtn = document.getElementById('forgot-btn');

  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'home.html';
  });

  loginBtn.addEventListener('click', () => {
    const emailVal = email.value.trim();
    const passVal = password.value;
    errorDiv.textContent = '';

    if (!emailVal ||!passVal) {
      errorDiv.textContent = 'Please enter email and password';
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    signInWithEmailAndPassword(auth, emailVal, passVal)
     .then(() => window.location.href = 'home.html')
     .catch((error) => {
        let message = 'Incorrect email or password';
        if (error.code === 'auth/too-many-requests') message = 'Too many attempts. Try later';
        errorDiv.textContent = message;
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      });
  });

  forgotBtn.addEventListener('click', () => {
    const emailVal = email.value.trim();
    errorDiv.textContent = '';
    if (!emailVal) {
      errorDiv.textContent = 'Enter your email first';
      return;
    }
    sendPasswordResetEmail(auth, emailVal)
     .then(() => errorDiv.textContent = 'Reset email sent. Check inbox');
  });
</script>
</body>
</html>
