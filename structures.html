<script>
// Progress tracking
const totalSections = 25;
let completed = JSON.parse(localStorage.getItem('completedSections') || '[]');

function updateProgress() {
  const percent = (completed.length / totalSections) * 100;
  document.getElementById('progress-fill').style.width = percent + '%';
  document.getElementById('progress-text').textContent = `${completed.length}/${totalSections} sections completed`;
  completed.forEach(id => {
    const btn = document.getElementById(`complete-${id}`);
    if (btn) btn.classList.add('completed');
  });
}

function markSectionComplete(id) {
  if (!completed.includes(id)) {
    completed.push(id);
    localStorage.setItem('completedSections', JSON.stringify(completed));
    updateProgress();
  }
}

// Theme toggle
function toggleTheme() {
  document.body.classList.toggle('dark-theme');
  localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
}

// Initialize
window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-theme');
  }
  updateProgress();
});

// Force MathJax to render after everything loads
window.addEventListener('load', function() {
  if (window.MathJax) {
    MathJax.typesetPromise();
  }
});
</script>
