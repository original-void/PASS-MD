<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Civil Eng Revision</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a202c;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
 .register-box {
    background: #2d3748;
    padding: 40px;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
  }
  h2 { margin: 0 0 30px 0; text-align: center; color: #90cdf4; }
  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #1a202c;
    border: 1px solid #4a5568;
    border-radius: 4px;
    color: #e2e8f0;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    background: #38a169;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:disabled { background: #4a5568; cursor: not-allowed; }
  #error-msg { color: #fc8181; margin-top: 12px; font-size: 14px; text-align: center; min-height: 20px; }
  a { display: block; text-align: center; margin-top: 20px; color: #63b3ed; text-decoration: none; }
  
 /* WhatsApp Button */
 .whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    box-sizing: border-box;
    transition: all 0.2s;
  }
 .whatsapp-btn:hover { background: #1ebe5d; transform: translateY(-1px); }
 .whatsapp-btn svg { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="register-box">
  <h2>Create Account</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password - min 6 chars">
  <div id="error-msg"></div>
  <button id="register-btn">Register</button>
  <a href="index.html">Already have account? Login</a>
  
  <!-- WhatsApp Channel Button -->
  <a href="https://whatsapp.com/channel/0029Vb8RWuuDuMRnfJErkX1u" target="_blank" rel="noopener" class="whatsapp-btn">
    <svg fill="currentColor" viewBox="0 0 24 24">
      <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981z"/>
    </svg>
    Join WhatsApp Channel for Updates
  </a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjPfuz8DdGgEnRsD9nXeka2yN7v_oh3jk",
    authDomain: "junior-study.firebaseapp.com",
    projectId: "junior-study",
    storageBucket: "junior-study.firebasestorage.app",
    messagingSenderId: "942218434406",
    appId: "1:942218434406:web:8e95fc80fc28c79fe01aa7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const name = document.getElementById('name');
  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const errorDiv = document.getElementById('error-msg');
  const btn = document.getElementById('register-btn');

  btn.addEventListener('click', () => {
    const nameVal = name.value.trim();
    const emailVal = email.value.trim();
    const passVal = password.value;
    errorDiv.textContent = '';

    if (!nameVal ||!emailVal || passVal.length < 6) {
      errorDiv.textContent = 'Fill all fields. Password min 6 chars';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating...';

    createUserWithEmailAndPassword(auth, emailVal, passVal)
     .then((cred) => updateProfile(cred.user, { displayName: nameVal }))
     .then(() => window.location.href = 'home.html')
     .catch((err) => {
        let msg = 'Registration failed';
        if (err.code === 'auth/email-already-in-use') msg = 'Email already registered';
        errorDiv.textContent = msg;
        btn.disabled = false;
        btn.textContent = 'Register';
      });
  });
</script>
</body>
</html>
