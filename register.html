<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Civil Eng Revision</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a202c;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
 .register-box {
    background: #2d3748;
    padding: 40px;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
  }
  h2 { margin: 0 0 30px 0; text-align: center; color: #90cdf4; }
  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #1a202c;
    border: 1px solid #4a5568;
    border-radius: 4px;
    color: #e2e8f0;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    background: #38a169;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:disabled { background: #4a5568; cursor: not-allowed; }
  #error-msg { color: #fc8181; margin-top: 12px; font-size: 14px; text-align: center; min-height: 20px; }
  a { display: block; text-align: center; margin-top: 20px; color: #63b3ed; text-decoration: none; }
</style>
</head>
<body>
<div class="register-box">
  <h2>Create Account</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password - min 6 chars">
  <div id="error-msg"></div>
  <button id="register-btn">Register</button>
  <a href="index.html">Already have account? Login</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjPfuz8DdGgEnRsD9nXeka2yN7v_oh3jk",
    authDomain: "junior-study.firebaseapp.com",
    projectId: "junior-study",
    storageBucket: "junior-study.firebasestorage.app",
    messagingSenderId: "942218434406",
    appId: "1:942218434406:web:8e95fc80fc28c79fe01aa7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const name = document.getElementById('name');
  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const errorDiv = document.getElementById('error-msg');
  const btn = document.getElementById('register-btn');

  btn.addEventListener('click', () => {
    const nameVal = name.value.trim();
    const emailVal = email.value.trim();
    const passVal = password.value;
    errorDiv.textContent = '';

    if (!nameVal ||!emailVal || passVal.length < 6) {
      errorDiv.textContent = 'Fill all fields. Password min 6 chars';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating...';

    createUserWithEmailAndPassword(auth, emailVal, passVal)
     .then((cred) => updateProfile(cred.user, { displayName: nameVal }))
     .then(() => window.location.href = 'home.html')
     .catch((err) => {
        let msg = 'Registration failed';
        if (err.code === 'auth/email-already-in-use') msg = 'Email already registered';
        errorDiv.textContent = msg;
        btn.disabled = false;
        btn.textContent = 'Register';
      });
  });
</script>
</body>
</html>
